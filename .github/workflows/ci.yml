# =============================================================================
# MiniQuantDesk V4 - CI Pipeline
# P0-1: Patch Discipline + CI Gate
# CI-PLATFORM-01: Windows platform lane
# =============================================================================
#
# Jobs run on every push and pull request:
#
#   gui-contract - GUI truth tests, build gate, and daemon/GUI contract gate.
#
#   guards    - Deterministic pattern guard (check_unsafe_patterns.sh).
#               Fails if Uuid::new_v4() appears in production src/, or if
#               Utc::now() appears in mqk-db/src/ (enforcement scope).
#
#   rust      - Format check, Clippy (deny warnings), and cargo test.
#               Uses an ephemeral Postgres service so the broad workspace test
#               job does not fail spuriously on load-bearing DB proofs.
#
#   db-proof  - Foundational Postgres-backed proof lane. Provisions a fresh
#               Postgres service, runs migrations from scratch, and executes a
#               narrow set of DB-backed safety proofs on every merge.
#
#   windows   - CI-PLATFORM-01: fmt + clippy + workspace tests on windows-latest.
#               Proves the build is clean on the real operator platform class.
#               No DB lanes (no Postgres service on windows-latest runners).
#               CARGO_BUILD_JOBS=1 + CARGO_INCREMENTAL=0 + RUSTFLAGS=-C debuginfo=0
#               + --test-threads=1 reproduces the proven local -LowMemory posture
#               (HARNESS-01).
#
# Rust workspace root: ./core-rs
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:

  gui-contract:
    name: "GUI Truth Tests + Build + Daemon Contract Gate"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./core-rs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: core-rs/mqk-gui/package-lock.json

      - name: Install GUI dependencies
        run: |
          cd mqk-gui
          npm ci

      - name: GUI truth tests (source authority + truth rendering + API wrappers)
        run: |
          cd mqk-gui
          npm run test

      - name: GUI build gate (tsc + vite build)
        run: |
          cd mqk-gui
          npm run build

      - name: Show explicit GUI/daemon contract waivers
        run: |
          test -s ../docs/ci/gui_daemon_contract_waivers.md
          cat ../docs/ci/gui_daemon_contract_waivers.md

      - name: Daemon/GUI contract gate (authoritative endpoints)
        run: cargo test -p mqk-daemon --test scenario_gui_daemon_contract_gate
  guards:
    name: "Safety Guards (P0-1)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run unsafe-pattern guard
        run: bash scripts/guards/check_unsafe_patterns.sh

      - name: Run migration governance guard
        run: bash scripts/guards/check_migration_governance.sh

      - name: CI-11 - Enforce no bare ignored load-bearing proof tests
        run: bash scripts/guards/check_ignored_load_bearing_proofs.sh

      - name: DEP-GOV-01 - Enforce workspace dependency inheritance (no inline sqlx pins)
        run: bash scripts/guards/check_workspace_dep_inheritance.sh

  rust:
    name: "Rust (fmt + clippy + test)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mqk
          POSTGRES_PASSWORD: mqk
          POSTGRES_DB: mqk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mqk -d mqk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      MQK_DATABASE_URL: postgres://mqk:mqk@127.0.0.1:5432/mqk_test

    defaults:
      run:
        working-directory: ./core-rs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('core-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace

  db-proof:
    name: "DB Proof Lane (Postgres)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mqk
          POSTGRES_PASSWORD: mqk
          POSTGRES_DB: mqk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mqk -d mqk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      MQK_DATABASE_URL: postgres://mqk:mqk@127.0.0.1:5432/mqk_test

    defaults:
      run:
        working-directory: ./core-rs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('core-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run repo-native DB proof harness
        run: bash ../scripts/db_proof_bootstrap.sh

  windows:
    name: "Windows Platform (no-DB lanes) [CI-PLATFORM-01]"
    runs-on: windows-latest
    # CI-PLATFORM-01: Windows-class platform validation.
    #
    # Proves: cargo fmt, clippy (deny warnings), and workspace tests compile and pass
    #         on the same OS class as the real operator environment.
    # Does NOT prove: DB-backed lanes. GitHub Actions windows-latest runners do not
    #         expose Docker service containers, so Postgres is unavailable here.
    #         DB-backed proof is covered by the ubuntu db-proof job on every push.
    # Memory posture: CARGO_BUILD_JOBS=1 + CARGO_INCREMENTAL=0 + RUSTFLAGS=-C debuginfo=0
    #         reproduces the proven local -LowMemory posture (HARNESS-01) exactly.
    # Test parallelism: --test-threads=1 matches the canonical harness posture.

    env:
      CARGO_BUILD_JOBS: 1
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: -C debuginfo=0
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    defaults:
      run:
        working-directory: ./core-rs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            core-rs\target
          key: ${{ runner.os }}-cargo-${{ hashFiles('core-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace (no-DB, --test-threads=1)
        run: cargo test --workspace -- --test-threads=1
