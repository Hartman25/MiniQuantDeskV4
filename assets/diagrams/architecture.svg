<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg { fill: #0b0f14; }
      .card { fill: #111823; stroke: #2a3443; stroke-width: 2; rx: 18; }
      .title { fill: #e6edf3; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; font-weight: 700; font-size: 22px; }
      .label { fill: #c9d1d9; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; font-size: 16px; }
      .muted { fill: #8b949e; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; font-size: 14px; }
      .pill { fill: #0f1722; stroke: #2a3443; stroke-width: 2; rx: 14; }
      .arrow { stroke: #6e7681; stroke-width: 2.5; fill: none; marker-end: url(#m); }
      .wire { stroke: #2a3443; stroke-width: 2; fill: none; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6e7681"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="700"/>

  <!-- Title -->
  <text x="60" y="70" class="title">MiniQuantDeskV4 — System Architecture (high level)</text>
  <text x="60" y="100" class="muted">Deterministic data → replayable backtests → gated execution (lifecycle + risk + integrity)</text>

  <!-- Left column: Inputs -->
  <rect class="card" x="60" y="140" width="320" height="220"/>
  <text x="90" y="185" class="title" font-size="18">Inputs</text>

  <rect class="pill" x="90" y="205" width="260" height="46"/>
  <text x="110" y="234" class="label">Market Data (CSV / Provider)</text>

  <rect class="pill" x="90" y="265" width="260" height="46"/>
  <text x="110" y="294" class="label">Broker Snapshots</text>

  <rect class="pill" x="90" y="325" width="260" height="46"/>
  <text x="110" y="354" class="label">Research Artifacts (optional)</text>

  <!-- Center: Core Rust spine -->
  <rect class="card" x="440" y="140" width="700" height="420"/>
  <text x="470" y="185" class="title">Rust Execution Spine (core-rs)</text>
  <text x="470" y="212" class="muted">Subsystems are designed to be testable and scenario-validated</text>

  <!-- Core boxes -->
  <rect class="pill" x="470" y="245" width="300" height="56"/>
  <text x="490" y="280" class="label">Market Data Ingest + Quality Gates</text>
  <text x="490" y="302" class="muted">mqk-md → md_bars</text>

  <rect class="pill" x="820" y="245" width="290" height="56"/>
  <text x="840" y="280" class="label">DB + Lifecycle Enforcement</text>
  <text x="840" y="302" class="muted">mqk-db (CREATED→ARMED→RUNNING→STOPPED)</text>

  <rect class="pill" x="470" y="325" width="300" height="56"/>
  <text x="490" y="360" class="label">Backtest (Deterministic Replay)</text>
  <text x="490" y="382" class="muted">mqk-backtest (worst-case ambiguity)</text>

  <rect class="pill" x="820" y="325" width="290" height="56"/>
  <text x="840" y="360" class="label">Reconcile (Drift / Normalization)</text>
  <text x="840" y="382" class="muted">mqk-reconcile (snapshot adapter + drift)</text>

  <rect class="pill" x="470" y="405" width="300" height="56"/>
  <text x="490" y="440" class="label">Integrity + Risk Gates</text>
  <text x="490" y="462" class="muted">mqk-integrity + mqk-risk (halts / caps / PDT helpers)</text>

  <rect class="pill" x="820" y="405" width="290" height="56"/>
  <text x="840" y="440" class="label">Execution Boundary</text>
  <text x="840" y="462" class="muted">mqk-execution (intent → order constraints)</text>

  <rect class="pill" x="470" y="485" width="640" height="56"/>
  <text x="490" y="520" class="label">Control Plane</text>
  <text x="490" y="542" class="muted">CLI + Daemon API + GUI (status + lifecycle control)</text>

  <!-- Right: Outputs -->
  <rect class="card" x="60" y="395" width="320" height="165"/>
  <text x="90" y="440" class="title" font-size="18">Outputs</text>

  <rect class="pill" x="90" y="460" width="260" height="46"/>
  <text x="110" y="489" class="label">Deterministic Runs / Logs</text>

  <rect class="pill" x="90" y="515" width="260" height="46"/>
  <text x="110" y="544" class="label">Orders / Lifecycle Events</text>

  <!-- Arrows -->
  <path class="arrow" d="M350 228 C400 228, 410 273, 440 273"/>
  <path class="arrow" d="M350 288 C400 288, 410 353, 440 353"/>
  <path class="arrow" d="M350 348 C400 348, 410 436, 440 436"/>

  <path class="arrow" d="M440 520 C410 520, 400 520, 380 520"/>
  <path class="arrow" d="M440 475 C410 475, 400 475, 380 475"/>

  <!-- Footer note -->
  <text x="60" y="650" class="muted">
    Note: Diagram is conceptual — “scenario-tested” ≠ “production-live safe”. Live readiness depends on end-to-end idempotent broker submission discipline + OMS edge-case hardening.
  </text>
</svg>